name: ournest
description:
publish_to:

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  dotted_border: ^2.1.0
  equatable: ^2.0.5
  flutter_bloc: ^8.1.3
  image_picker: ^1.0.7
  flutter_screenutil: ^5.9.0
  dio: ^5.9.2


  flutter_svg: any
  http_parser: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  syncfusion_flutter_gauges: ^24.1.41


flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/fonts/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf
    - family: Regular
      fonts:
        - asset: assets/fonts/Regular.ttf
    - family: Pacifico
      fonts:
        - asset: assets/fonts/Pacifico-Regular.ttf
    - family: Alexandria
      fonts:
        - asset: assets/fonts/Alexandria.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_28pt-Regular.ttf